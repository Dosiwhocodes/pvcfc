{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10">

<h1 class="text-2xl font-bold mb-6">Giỏ hàng</h1>

<div id="cartItems">
  {% for item in cart %}
  <div class="flex justify-between border-b py-3">
    <div>
      <h3>{{ item.name }}</h3>
      <p>{{ item.price }}đ</p>
    </div>
    <div>
      <button onclick="updateCart({{ forloop.counter0 }}, 'dec')">-</button>
      {{ item.quantity }}
      <button onclick="updateCart({{ forloop.counter0 }}, 'inc')">+</button>
      <button onclick="updateCart({{ forloop.counter0 }}, 'remove')">❌</button>
    </div>
  </div>
  {% endfor %}
</div>

<h2 class="mt-6 font-bold">Tổng: {{ total }}đ</h2>

<a href="/checkout/" 
   class="bg-green-600 text-white px-6 py-2 rounded mt-4 inline-block">
   Thanh toán
</a>

<script>
function getCSRFToken() {
  return document.cookie.split('; ')
    .find(row => row.startsWith('csrftoken'))
    ?.split('=')[1];
}

function updateCart(index, action){
  fetch("/update-cart/", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded",
      "X-CSRFToken": getCSRFToken()
    },
    body: `index=${index}&action=${action}`
  })
  .then(res => res.json())
  .then(data => {
    location.reload();
  });
}
</script>

</body>
</html>
