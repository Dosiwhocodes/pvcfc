<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-5xl mx-auto p-6">

    <!-- Nút quay lại -->
    <a href="/" class="text-blue-500 hover:underline mb-4 inline-block">
        ← Quay lại trang chủ
    </a>

    <div class="bg-white shadow-lg rounded-2xl p-6 grid md:grid-cols-2 gap-6">

        <!-- Ảnh -->
        <div>
            {% if product.image %}
                <img src="{{ product.image.url }}" 
                     class="w-full h-[400px] object-cover rounded-xl">
            {% else %}
                <div class="w-full h-[400px] bg-gray-200 flex items-center justify-center rounded-xl">
                    Không có ảnh
                </div>
            {% endif %}
        </div>

        <!-- Thông tin -->
        <div>
            <h1 class="text-3xl font-bold mb-4">
                {{ product.name }}
            </h1>

            <p class="text-red-500 text-2xl font-semibold mb-4">
                {{ product.price }} VND
            </p>

            <p class="text-gray-700 leading-relaxed">
                {{ product.description }}
            </p>
        </div>

    </div>

</div>

</body>
</html>
